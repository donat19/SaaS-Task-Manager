<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Strata — Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: oklch(0.985 0.004 80);
    --bg-elev: oklch(1 0 0);
    --bg-soft: oklch(0.965 0.005 80);
    --bg-sunk: oklch(0.955 0.006 80);
    --line: oklch(0.91 0.005 80);
    --line-soft: oklch(0.94 0.005 80);
    --ink: oklch(0.18 0.01 80);
    --ink-2: oklch(0.36 0.01 80);
    --ink-3: oklch(0.55 0.01 80);
    --ink-4: oklch(0.7 0.008 80);
    --accent: oklch(0.55 0.16 280);
    --accent-soft: oklch(0.96 0.025 280);
    --accent-ink: oklch(0.4 0.18 280);
    --status-todo: oklch(0.7 0.005 80);
    --status-prog: oklch(0.65 0.14 60);
    --status-rev: oklch(0.62 0.13 230);
    --status-done: oklch(0.62 0.12 150);
    --status-block: oklch(0.62 0.16 25);
    --pri-low: oklch(0.65 0.04 220);
    --pri-med: oklch(0.65 0.13 80);
    --pri-high: oklch(0.62 0.16 25);
    --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.04), 0 0 0 0.5px oklch(0.2 0.01 80 / 0.06);
    --shadow-md: 0 4px 16px oklch(0.2 0.01 80 / 0.06), 0 0 0 0.5px oklch(0.2 0.01 80 / 0.06);
    --shadow-lg: 0 24px 60px oklch(0.2 0.01 80 / 0.14), 0 0 0 0.5px oklch(0.2 0.01 80 / 0.08);
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --r-xl: 18px;
    --font: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
    --serif: "Instrument Serif", ui-serif, serif;
  }
  html.dark {
    --bg: oklch(0.16 0.005 80);
    --bg-elev: oklch(0.2 0.006 80);
    --bg-soft: oklch(0.185 0.006 80);
    --bg-sunk: oklch(0.13 0.005 80);
    --line: oklch(0.28 0.006 80);
    --line-soft: oklch(0.24 0.006 80);
    --ink: oklch(0.96 0.005 80);
    --ink-2: oklch(0.78 0.005 80);
    --ink-3: oklch(0.6 0.005 80);
    --ink-4: oklch(0.45 0.005 80);
    --accent: oklch(0.72 0.16 280);
    --accent-soft: oklch(0.28 0.06 280);
    --accent-ink: oklch(0.85 0.14 280);
    --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.4), 0 0 0 0.5px oklch(1 0 0 / 0.04);
    --shadow-md: 0 4px 16px oklch(0 0 0 / 0.4), 0 0 0 0.5px oklch(1 0 0 / 0.04);
    --shadow-lg: 0 24px 60px oklch(0 0 0 / 0.5), 0 0 0 0.5px oklch(1 0 0 / 0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    font-feature-settings: "cv11", "ss01", "ss03";
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }

  /* App shell */
  .app { display: grid; grid-template-columns: 232px 1fr; height: 100vh; width: 100vw; }
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: oklch(0.7 0.005 80 / 0.25); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: oklch(0.5 0.005 80 / 0.35); border: 2px solid transparent; background-clip: content-box; }

  /* Sidebar */
  .sb { background: var(--bg-soft); border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
  .sb-brand { display: flex; align-items: center; gap: 9px; padding: 16px 16px 12px; }
  .sb-mark { width: 22px; height: 22px; position: relative; }
  .sb-mark::before, .sb-mark::after { content: ""; position: absolute; inset: 0; border-radius: 4px; }
  .sb-mark::before { background: var(--ink); transform: translate(-2px, -2px); }
  .sb-mark::after { background: var(--accent); transform: translate(2px, 2px); mix-blend-mode: multiply; opacity: 0.75; }
  html.dark .sb-mark::after { mix-blend-mode: screen; opacity: 0.85; }
  .sb-name { font-weight: 600; letter-spacing: -0.01em; font-size: 14.5px; }
  .sb-name em { font-style: normal; font-family: var(--serif); font-weight: 400; font-style: italic; color: var(--accent); margin-left: 2px; }

  .sb-search { padding: 0 12px 10px; }
  .sb-search-in { display: flex; align-items: center; gap: 8px; padding: 6px 9px; background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r-md); font-size: 12.5px; color: var(--ink-3); cursor: text; }
  .sb-search-in kbd { margin-left: auto; font-family: var(--mono); font-size: 10px; background: var(--bg-sunk); border: 1px solid var(--line); padding: 1px 5px; border-radius: 4px; color: var(--ink-3); }

  .sb-sect { padding: 14px 12px 4px; font-size: 10.5px; font-weight: 550; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-4); display: flex; justify-content: space-between; align-items: center; }
  .sb-sect button { all: unset; cursor: pointer; width: 16px; height: 16px; display: grid; place-items: center; color: var(--ink-3); border-radius: 4px; }
  .sb-sect button:hover { background: oklch(0 0 0 / 0.05); color: var(--ink); }
  html.dark .sb-sect button:hover { background: oklch(1 0 0 / 0.06); }

  .sb-list { display: flex; flex-direction: column; gap: 1px; padding: 0 8px; }
  .sb-item { display: flex; align-items: center; gap: 9px; padding: 6px 8px; border-radius: 7px; cursor: pointer; font-size: 13px; color: var(--ink-2); position: relative; }
  .sb-item:hover { background: oklch(0 0 0 / 0.04); color: var(--ink); }
  html.dark .sb-item:hover { background: oklch(1 0 0 / 0.04); }
  .sb-item.active { background: var(--bg-elev); color: var(--ink); box-shadow: var(--shadow-sm); }
  .sb-item .ic { width: 14px; height: 14px; color: var(--ink-3); flex-shrink: 0; }
  .sb-item.active .ic { color: var(--accent); }
  .sb-item .count { margin-left: auto; font-size: 11px; color: var(--ink-4); font-variant-numeric: tabular-nums; }
  .sb-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .sb-foot { margin-top: auto; padding: 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--line-soft); }
  .av { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; font-size: 10.5px; font-weight: 600; color: white; letter-spacing: 0.02em; }
  .sb-me { display: flex; flex-direction: column; min-width: 0; flex: 1; }
  .sb-me-name { font-size: 12.5px; font-weight: 550; }
  .sb-me-role { font-size: 10.5px; color: var(--ink-4); font-family: var(--mono); }

  /* Topbar */
  .main { display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--bg); }
  .top { display: flex; align-items: center; gap: 14px; padding: 12px 24px; border-bottom: 1px solid var(--line); background: var(--bg); flex-shrink: 0; }
  .crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-3); }
  .crumbs strong { color: var(--ink); font-weight: 600; }
  .crumbs .sep { color: var(--ink-4); }

  .seg { display: inline-flex; align-items: center; padding: 2px; background: var(--bg-soft); border: 1px solid var(--line); border-radius: 8px; gap: 1px; }
  .seg button { all: unset; cursor: pointer; padding: 4px 10px; font-size: 12px; color: var(--ink-3); border-radius: 6px; display: inline-flex; align-items: center; gap: 6px; }
  .seg button:hover { color: var(--ink); }
  .seg button.on { background: var(--bg-elev); color: var(--ink); box-shadow: var(--shadow-sm); }
  .seg .ic { width: 13px; height: 13px; }

  .top-spacer { flex: 1; }

  .presence { display: flex; align-items: center; }
  .presence .av { width: 24px; height: 24px; font-size: 9.5px; border: 2px solid var(--bg); margin-left: -6px; box-shadow: 0 0 0 0.5px oklch(0 0 0 / 0.1); }
  .presence .av:first-child { margin-left: 0; }
  .presence .more { width: 24px; height: 24px; border-radius: 50%; background: var(--bg-soft); border: 2px solid var(--bg); display: grid; place-items: center; font-size: 10px; color: var(--ink-3); font-weight: 550; margin-left: -6px; }

  .icbtn { all: unset; cursor: pointer; width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; color: var(--ink-2); position: relative; }
  .icbtn:hover { background: var(--bg-soft); color: var(--ink); }
  .icbtn .ic { width: 15px; height: 15px; }
  .icbtn .badge { position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; border-radius: 50%; background: var(--status-block); border: 1.5px solid var(--bg); }

  .btn { all: unset; cursor: pointer; padding: 6px 12px; border-radius: 8px; font-size: 12.5px; font-weight: 550; display: inline-flex; align-items: center; gap: 6px; transition: background 0.12s; }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover { background: oklch(from var(--ink) calc(l + 0.08) c h); }
  .btn-ghost { color: var(--ink-2); border: 1px solid var(--line); }
  .btn-ghost:hover { background: var(--bg-soft); color: var(--ink); }
  .btn .ic { width: 13px; height: 13px; }

  /* Board */
  .board-head { padding: 18px 24px 14px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-shrink: 0; }
  .board-title-wrap { display: flex; flex-direction: column; gap: 4px; }
  .board-title { font-size: 22px; font-weight: 600; letter-spacing: -0.018em; line-height: 1.2; }
  .board-title em { font-family: var(--serif); font-weight: 400; font-style: italic; font-size: 24px; color: var(--accent); }
  .board-sub { font-size: 12.5px; color: var(--ink-3); display: flex; align-items: center; gap: 12px; }
  .board-sub .meta { display: inline-flex; align-items: center; gap: 5px; }
  .board-sub .meta .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-4); }

  .board-tools { display: flex; align-items: center; gap: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px; background: var(--bg-soft); border: 1px solid var(--line); border-radius: 999px; font-size: 11.5px; color: var(--ink-2); cursor: pointer; }
  .chip:hover { color: var(--ink); }
  .chip .ic { width: 11px; height: 11px; }
  .chip-x { width: 13px; height: 13px; opacity: 0.5; }
  .chip:hover .chip-x { opacity: 1; }

  /* Kanban */
  .kanban { flex: 1; overflow: auto; padding: 8px 24px 24px; min-height: 0; }
  .columns { display: flex; gap: 16px; min-width: min-content; padding-bottom: 12px; }
  .col { width: 296px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
  .col-hd { display: flex; align-items: center; gap: 8px; padding: 4px 4px 0; }
  .col-hd .swatch { width: 8px; height: 8px; border-radius: 2px; }
  .col-hd-title { font-size: 12.5px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }
  .col-hd-count { font-size: 11px; color: var(--ink-4); font-variant-numeric: tabular-nums; padding: 1px 6px; background: var(--bg-soft); border-radius: 999px; border: 1px solid var(--line-soft); }
  .col-hd-spacer { flex: 1; }
  .col-hd-act { all: unset; cursor: pointer; width: 22px; height: 22px; border-radius: 5px; display: grid; place-items: center; color: var(--ink-3); }
  .col-hd-act:hover { background: var(--bg-soft); color: var(--ink); }
  .col-hd-act .ic { width: 13px; height: 13px; }

  .col-body { display: flex; flex-direction: column; gap: 8px; min-height: 60px; padding: 2px; border-radius: 12px; transition: background 0.15s; }
  .col-body.over { background: var(--accent-soft); outline: 1.5px dashed var(--accent); outline-offset: -2px; }

  .card { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r-md); padding: 12px 13px; cursor: grab; box-shadow: var(--shadow-sm); transition: transform 0.12s, box-shadow 0.12s; }
  .card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); border-color: oklch(from var(--line) calc(l - 0.04) c h); }
  .card.dragging { opacity: 0.4; cursor: grabbing; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 7px; }
  .tag { font-size: 10px; font-weight: 550; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.01em; }
  .card-title { font-size: 13.5px; font-weight: 550; color: var(--ink); line-height: 1.35; letter-spacing: -0.005em; }
  .card-desc { font-size: 12px; color: var(--ink-3); line-height: 1.45; margin-top: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-foot { display: flex; align-items: center; gap: 10px; margin-top: 11px; }
  .card-foot .meta { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ink-3); }
  .card-foot .meta .ic { width: 11px; height: 11px; }
  .card-foot .due { font-family: var(--mono); font-size: 10.5px; }
  .card-foot .due.late { color: var(--status-block); }
  .card-foot .spacer { flex: 1; }
  .card-foot .av { width: 20px; height: 20px; font-size: 9px; }
  .card-id { font-family: var(--mono); font-size: 10px; color: var(--ink-4); margin-bottom: 5px; letter-spacing: 0.02em; }
  .card-progress { height: 3px; background: var(--bg-sunk); border-radius: 2px; margin-top: 9px; overflow: hidden; }
  .card-progress > div { height: 100%; background: var(--accent); border-radius: 2px; }
  .card.priority-high { box-shadow: var(--shadow-sm), inset 3px 0 0 var(--pri-high); border-color: oklch(from var(--pri-high) 0.85 0.04 h); }
  html.dark .card.priority-high { border-color: oklch(from var(--pri-high) 0.4 0.08 h); }

  .col-add { background: transparent; border: 1px dashed var(--line); border-radius: var(--r-md); padding: 9px; font-size: 12px; color: var(--ink-3); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.12s; }
  .col-add:hover { background: var(--bg-soft); color: var(--ink); border-color: var(--ink-4); }
  .col-add .ic { width: 12px; height: 12px; }

  .col-add-form { display: flex; flex-direction: column; gap: 6px; padding: 10px; background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--shadow-md); }
  .col-add-form textarea { all: unset; min-height: 40px; font-size: 13px; color: var(--ink); resize: none; }
  .col-add-form textarea::placeholder { color: var(--ink-4); }
  .col-add-form-row { display: flex; gap: 6px; align-items: center; }

  /* Table view */
  .table-wrap { flex: 1; overflow: auto; padding: 0 24px 24px; min-height: 0; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl thead th { text-align: left; font-size: 10.5px; font-weight: 550; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-4); padding: 10px 12px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 1; }
  .tbl tbody tr { border-bottom: 1px solid var(--line-soft); cursor: pointer; }
  .tbl tbody tr:hover { background: var(--bg-soft); }
  .tbl td { padding: 12px; vertical-align: middle; }
  .tbl td.title { font-weight: 500; color: var(--ink); }
  .tbl .pill { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 550; }

  /* Modal */
  .scrim { position: fixed; inset: 0; background: oklch(0.2 0.01 80 / 0.4); backdrop-filter: blur(6px); z-index: 50; display: grid; place-items: center; padding: 32px; animation: fadeIn 0.18s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .modal { background: var(--bg-elev); border-radius: var(--r-xl); width: 100%; max-width: 880px; max-height: 100%; display: grid; grid-template-columns: 1fr 280px; box-shadow: var(--shadow-lg); overflow: hidden; animation: slideUp 0.22s cubic-bezier(0.2, 0.8, 0.2, 1); }
  @media (max-width: 760px) { .modal { grid-template-columns: 1fr; } }
  .m-main { padding: 22px 26px 26px; overflow-y: auto; min-height: 0; }
  .m-side { background: var(--bg-soft); border-left: 1px solid var(--line); padding: 20px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
  .m-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .m-head .id { font-family: var(--mono); font-size: 11px; color: var(--ink-4); padding: 2px 7px; background: var(--bg-soft); border-radius: 5px; }
  .m-head-spacer { flex: 1; }
  .m-title { font-size: 22px; font-weight: 600; letter-spacing: -0.018em; line-height: 1.25; margin: 0 0 12px; outline: none; }
  .m-title:focus { background: var(--accent-soft); border-radius: 6px; }
  .m-meta-row { display: grid; grid-template-columns: 96px 1fr; gap: 10px 12px; align-items: center; font-size: 12.5px; padding: 6px 0; }
  .m-meta-lbl { color: var(--ink-3); display: flex; align-items: center; gap: 7px; }
  .m-meta-lbl .ic { width: 13px; height: 13px; }
  .m-desc-h { font-size: 11px; font-weight: 550; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-4); margin: 18px 0 8px; }
  .m-desc { font-size: 13px; color: var(--ink-2); line-height: 1.6; }
  .m-desc p { margin: 0 0 10px; }
  .m-desc ul { margin: 4px 0 10px; padding-left: 20px; }
  .m-desc li { margin: 3px 0; }

  .m-side-h { font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-4); margin-bottom: 8px; }

  .m-files { display: flex; flex-direction: column; gap: 6px; }
  .m-file { display: flex; align-items: center; gap: 9px; padding: 8px 10px; background: var(--bg-elev); border: 1px solid var(--line); border-radius: 8px; font-size: 12px; }
  .m-file-ic { width: 26px; height: 26px; border-radius: 6px; background: var(--bg-soft); display: grid; place-items: center; font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--ink-3); flex-shrink: 0; }
  .m-file-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .m-file-size { font-family: var(--mono); font-size: 10px; color: var(--ink-4); }
  .m-file-x { all: unset; cursor: pointer; width: 18px; height: 18px; display: grid; place-items: center; color: var(--ink-4); border-radius: 4px; }
  .m-file-x:hover { background: var(--bg-sunk); color: var(--ink-2); }

  .m-drop { border: 1.5px dashed var(--line); border-radius: 8px; padding: 14px; text-align: center; font-size: 11.5px; color: var(--ink-3); cursor: pointer; transition: 0.15s; }
  .m-drop:hover, .m-drop.over { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-ink); }

  .m-cmts { display: flex; flex-direction: column; gap: 14px; margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--line); }
  .m-cmt { display: flex; gap: 10px; }
  .m-cmt .av { width: 28px; height: 28px; font-size: 11px; flex-shrink: 0; }
  .m-cmt-body { flex: 1; min-width: 0; }
  .m-cmt-h { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .m-cmt-h b { font-size: 13px; font-weight: 600; }
  .m-cmt-h time { font-size: 11px; color: var(--ink-4); font-family: var(--mono); }
  .m-cmt-text { font-size: 13px; color: var(--ink-2); line-height: 1.55; }
  .m-cmt-text code { font-family: var(--mono); font-size: 11.5px; background: var(--bg-soft); padding: 1px 5px; border-radius: 4px; }

  .m-cmt-form { display: flex; gap: 10px; margin-top: 14px; align-items: flex-start; }
  .m-cmt-form textarea { all: unset; flex: 1; padding: 9px 12px; background: var(--bg-soft); border: 1px solid var(--line); border-radius: 10px; font-size: 13px; min-height: 36px; resize: vertical; }
  .m-cmt-form textarea:focus { border-color: var(--accent); background: var(--bg-elev); }

  /* Notifications dropdown */
  .pop { position: absolute; right: 0; top: calc(100% + 6px); width: 360px; background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--shadow-lg); z-index: 30; overflow: hidden; animation: slideUp 0.16s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .pop-h { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .pop-h b { font-size: 13px; font-weight: 600; }
  .pop-h a { font-size: 11.5px; color: var(--ink-3); cursor: pointer; }
  .pop-h a:hover { color: var(--accent); }
  .pop-list { max-height: 380px; overflow-y: auto; }
  .pop-item { padding: 11px 16px; border-bottom: 1px solid var(--line-soft); display: flex; gap: 10px; cursor: pointer; }
  .pop-item:hover { background: var(--bg-soft); }
  .pop-item:last-child { border-bottom: none; }
  .pop-item.unread { background: var(--accent-soft); }
  .pop-item .av { width: 28px; height: 28px; font-size: 11px; flex-shrink: 0; }
  .pop-item-body { flex: 1; min-width: 0; font-size: 12.5px; line-height: 1.5; color: var(--ink-2); }
  .pop-item-body b { color: var(--ink); font-weight: 600; }
  .pop-item-body time { display: block; font-size: 11px; color: var(--ink-4); font-family: var(--mono); margin-top: 3px; }
  .pop-item-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 8px; }
  .pop-item:not(.unread) .pop-item-dot { visibility: hidden; }

  /* Audit log */
  .audit { padding: 18px 24px; flex: 1; overflow: auto; min-height: 0; }
  .audit-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 16px; flex-wrap: wrap; }
  .audit-filters { display: flex; gap: 6px; }
  .audit-tbl { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; }
  .audit-row { display: grid; grid-template-columns: 160px 1fr 200px 140px; align-items: center; padding: 13px 18px; border-bottom: 1px solid var(--line-soft); font-size: 12.5px; }
  .audit-row:last-child { border-bottom: none; }
  .audit-row:hover { background: var(--bg-soft); }
  .audit-row .audit-time { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
  .audit-row .audit-actor { display: flex; align-items: center; gap: 8px; color: var(--ink-2); }
  .audit-row .audit-actor .av { width: 20px; height: 20px; font-size: 9px; }
  .audit-row .audit-evt { display: flex; align-items: center; gap: 7px; }
  .audit-row .audit-evt .pill { font-family: var(--mono); font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--bg-soft); border: 1px solid var(--line); color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.04em; }
  .audit-row .audit-evt b { font-weight: 550; color: var(--ink); }
  .audit-row .audit-target { color: var(--ink-3); font-family: var(--mono); font-size: 11.5px; }

  .audit-hd { display: grid; grid-template-columns: 160px 1fr 200px 140px; padding: 10px 18px; background: var(--bg-soft); border-bottom: 1px solid var(--line); font-size: 10.5px; font-weight: 550; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-4); }

  /* Onboarding tooltip */
  .tip { position: absolute; background: var(--ink); color: var(--bg); border-radius: 9px; padding: 10px 13px; font-size: 12px; max-width: 240px; box-shadow: var(--shadow-lg); z-index: 40; line-height: 1.5; }
  .tip::before { content: ""; position: absolute; width: 8px; height: 8px; background: var(--ink); transform: rotate(45deg); }
  .tip b { display: block; margin-bottom: 3px; font-size: 11.5px; }
  .tip-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 9px; font-size: 11px; }
  .tip-foot button { all: unset; cursor: pointer; padding: 3px 9px; border-radius: 5px; font-size: 11.5px; background: var(--bg); color: var(--ink); font-weight: 550; }
  .tip-foot span { color: oklch(from var(--bg) calc(l - 0.5) c h); font-family: var(--mono); }
  html.dark .tip-foot span { color: oklch(from var(--bg) calc(l + 0.5) c h); }

  /* Shortcuts overlay */
  .ks-scrim { position: fixed; inset: 0; background: oklch(0.2 0.01 80 / 0.5); backdrop-filter: blur(8px); z-index: 60; display: grid; place-items: center; padding: 32px; }
  .ks { background: var(--bg-elev); border-radius: var(--r-xl); padding: 26px 30px; max-width: 560px; width: 100%; box-shadow: var(--shadow-lg); }
  .ks h2 { margin: 0 0 18px; font-size: 17px; font-weight: 600; letter-spacing: -0.012em; }
  .ks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 32px; }
  .ks-row { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; padding: 5px 0; color: var(--ink-2); }
  .ks-row kbd { font-family: var(--mono); font-size: 10.5px; background: var(--bg-soft); border: 1px solid var(--line); padding: 2px 6px; border-radius: 4px; color: var(--ink-2); }
  .ks-grp { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-4); margin: 14px 0 4px; grid-column: 1 / -1; }
  .ks-grp:first-child { margin-top: 0; }

  /* Mobile nav */
  .mob-tabs { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-elev); border-top: 1px solid var(--line); padding: 8px 12px calc(8px + env(safe-area-inset-bottom)); justify-content: space-around; z-index: 20; }
  .mob-tabs button { all: unset; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 14px; font-size: 10.5px; color: var(--ink-3); border-radius: 8px; }
  .mob-tabs button.on { color: var(--accent); }
  .mob-tabs .ic { width: 18px; height: 18px; }
  @media (max-width: 900px) {
    .sb { display: none; }
    .mob-tabs { display: flex; }
    .kanban, .table-wrap, .audit { padding-bottom: 80px; }
    .top { padding: 12px 16px; flex-wrap: wrap; }
    .board-head { padding: 16px 16px 12px; }
    .kanban { padding-left: 16px; padding-right: 16px; }
  }

  .toast-wrap { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 70; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast { background: var(--ink); color: var(--bg); padding: 9px 14px; border-radius: 10px; font-size: 12.5px; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px; animation: slideUp 0.2s; }
  .toast .ic { width: 13px; height: 13px; }

  /* Hide tweaks scrim border in dark */
  html.dark .twk-panel { background: rgba(28, 27, 24, 0.78) !important; color: var(--ink) !important; }
  html.dark .twk-panel * { color: var(--ink) !important; }
</style>
